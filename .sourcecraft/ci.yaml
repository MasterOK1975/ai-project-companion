on:
  pull_request:
    - workflows: deploy-bot-workflow
      filter:
        source_branches: ["**", "!test**"]
        target_branches: "main"

tokens:
  SERVICE_CONNECTION_WITH_TOKEN:
    service_connection: "default-service-connection"
    scope: org

workflows:
  push-to-github:
    inputs:
      github-token:
        type: string
        required: true
        description: Your GitHub personal access token with repo scope
      github-username:
        type: string
        required: true
        default: "MasterOK1975"
        description: Your GitHub username
      github-repo:
        type: string
        required: true
        default: "ai-project-companion"
        description: GitHub repository name
    env:
      GH_TOKEN: ${{ inputs.github-token }}
      GH_USER: ${{ inputs.github-username }}
      GH_REPO: ${{ inputs.github-repo }}
    tasks:
      - name: push-task
        cubes:
          - name: push-to-github
            script:
              - |
                echo "Configuring git..."
                git config --global user.name "SourceCraft CI"
                git config --global user.email "ci@sourcecraft.dev"
                echo "Current branch:"
                git branch --show-current
                echo "All branches:"
                git branch -a
                echo "Adding GitHub remote..."
                git remote add github "https://${GH_USER}:${GH_TOKEN}@github.com/${GH_USER}/${GH_REPO}.git"
                echo "Pushing to GitHub..."
                git push -u github --all --force
                echo "Done! Code pushed to https://github.com/${GH_USER}/${GH_REPO}"

  deploy-bot-workflow:
    inputs:
      bot-username:
        type: string
        required: true
        default: "ai_project_companion"
        description: Your Telegram bot username without _bot from BotFather. Name must match the pattern /|[a-z][-a-z0-9]{1,61}[a-z0-9]/
      bot-token:
        type: string
        default: "8813413330:AAG9uUueZ8sSi6c56tcds8iK0OIzRHEya8s"
        description: Your Telegram bot token from BotFather
      openrouter-key:
        type: string
        default: "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"
        description: Your OpenRouter API key for AI analysis
    env:
      YC_BOT_NAME: ${{ inputs.bot-username }}
      TG_BOT_TOKEN: ${{ inputs.bot-token }}
      OPENROUTER_KEY: ${{ inputs.openrouter-key }}
    tasks:
      - name: deploy-bot-task
        cubes:
          - name: format-name
            script:
              - |
                func_name=$(echo "$YC_BOT_NAME" | tr '[:upper:]' '[:lower:]' | tr -d '_')
                echo "function_name=$func_name" >> $SOURCECRAFT_OUTPUT

          - name: deploy-func
            env:
              ID_TOKEN: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.id_token }}
              YC_SA_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.service_account_id }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
              YC_FUNCTION_NAME: ${{ cubes.format-name.outputs.function_name }}
              YC_FUNCTION_MEMORY: 256m
              YC_FUNCTION_RUNTIME: python312
              YC_FUNCTION_ENTRYPOINT: bot.main.handler
              SOURCE_PATH: "."
              ENVIRONMENT: "BOT_TOKEN=${{ inputs.bot-token }},OPENROUTER_API_KEY=${{ inputs.openrouter-key }},DATABASE_URL=sqlite:////tmp/data.db"
              PUBLIC: true
            image: cr.yandex/sourcecraft/yc-function:latest

          - name: get-iam-token
            env:
              ID_TOKEN: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.id_token }}
              YC_SA_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.service_account_id }}
            image: cr.yandex/sourcecraft/yc-iam:latest

          - name: set-timeout
            env:
              YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
              YC_FUNCTION_NAME: ${{ cubes.format-name.outputs.function_name }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                yc config set folder-id $YC_FOLDER_ID
                echo "Setting timeout to 30s..."
                yc serverless function version create \
                  --function-name=$YC_FUNCTION_NAME \
                  --runtime python312 \
                  --entrypoint bot.main.handler \
                  --memory 256m \
                  --execution-timeout 30s \
                  --source-path /sourcecraft/workspace \
                  --environment BOT_TOKEN=${{ inputs.bot-token }},OPENROUTER_API_KEY=${{ inputs.openrouter-key }},DATABASE_URL=sqlite:////tmp/data.db

          - name: make-public
            env:
              YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
              YC_FUNCTION_NAME: ${{ cubes.format-name.outputs.function_name }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                yc config set folder-id $YC_FOLDER_ID
                echo "Making function public..."
                yc serverless function allow-unauthenticated-invoke --name=$YC_FUNCTION_NAME
                echo "Function is now public!"

          - name: register-with-botfather
            env:
              TG_BOT_TOKEN: ${{ inputs.bot-token }}
            script:
              - |
                if [ -n "$TG_BOT_TOKEN" ] && [ "$TG_BOT_TOKEN" != "YOUR_TG_BOT_TOKEN" ]; then
                    echo "TG_BOT_TOKEN is properly set"
                    echo "Setting webhook..."
                    curl --request POST --url https://api.telegram.org/bot$TG_BOT_TOKEN/setWebhook?url=https://functions.yandexcloud.net/d4eoguqo1scppaunv4l4
                    echo "Webhook set!"
                else
                    echo "TG_BOT_TOKEN is either not set or equals placeholder value"
                fi

          - name: get-outputs
            script:
              - |
                echo "invoke_url=${{ cubes.deploy-func.outputs.invoke_url }}"
                echo "deployment_location=${{ cubes.deploy-func.outputs.deployment_location }}"
                echo "invoke_url=${{ cubes.deploy-func.outputs.invoke_url }}" > invoke_url.txt
                echo "deployment_location=${{ cubes.deploy-func.outputs.deployment_location }}" > deployment_location.txt
            artifacts:
              paths:
                - invoke_url.txt
                - deployment_location.txt

  deploy-container-workflow:
    inputs:
      bot-token:
        type: string
        default: "8813413330:AAG9uUueZ8sSi6c56tcds8iK0OIzRHEya8s"
        description: Your Telegram bot token from BotFather
      openrouter-key:
        type: string
        default: "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"
        description: Your OpenRouter API key for AI analysis
    env:
      YC_DOCKER_REGISTRY_URI: cr.yandex/crpecn8sot1efltgce9h
      IMAGE_NAME: ai-project-companion
      YC_SERVERLESS_CONTAINER_NAME: ai-project-companion
      YC_FOLDER_ID: b1g40t8uqo6unqc4v8tb
    tasks:
      - name: build-push-deploy
        cubes:
          - name: get-iam-token
            env:
              ID_TOKEN: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.id_token }}
              YC_SA_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.service_account_id }}
            image: cr.yandex/sourcecraft/yc-iam:latest

          - name: docker-build-push
            env:
              YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                echo "Installing docker..."
                apt-get update && apt-get install -y docker.io > /dev/null 2>&1
                echo "Logging to Container Registry..."
                echo "$YC_IAM_TOKEN" | docker login --username iam --password-stdin cr.yandex
                echo "Building image..."
                docker build --tag $YC_DOCKER_REGISTRY_URI/$IMAGE_NAME:latest --platform linux/amd64 .
                echo "Pushing image..."
                docker push $YC_DOCKER_REGISTRY_URI/$IMAGE_NAME:latest
                echo "Done!"

          - name: deploy-container
            env:
              YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
              YC_SERVICE_ACCOUNT_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.service_account_id }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                yc config set folder-id $YC_FOLDER_ID
                echo "Deploying container revision..."
                DEPLOY_OUTPUT=$(yc serverless container revision deploy \
                  --container-name $YC_SERVERLESS_CONTAINER_NAME \
                  --image $YC_DOCKER_REGISTRY_URI/$IMAGE_NAME:latest \
                  --service-account-id $YC_SERVICE_ACCOUNT_ID \
                  --execution-timeout 30s \
                  --environment BOT_TOKEN=${{ inputs.bot-token }} \
                  --environment OPENROUTER_API_KEY=${{ inputs.openrouter-key }} \
                  --environment DATABASE_URL=sqlite:////tmp/data.db)
                echo "$DEPLOY_OUTPUT"
                echo "Container deployed!"
                # Extract revision ID from output
                REVISION_ID=$(echo "$DEPLOY_OUTPUT" | grep "^id:" | sed 's/^id: //')
                echo "revision_id=$REVISION_ID" >> $SOURCECRAFT_OUTPUT

          - name: set-container-port
            env:
              YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                yc config set folder-id $YC_FOLDER_ID
                echo "Setting container port to 8080 via API..."
                LATEST_REVISION="${{ cubes.deploy-container.outputs.revision_id }}"
                echo "Latest revision ID: $LATEST_REVISION"
                curl -s -X PATCH \
                  "https://serverless-containers.api.cloud.yandex.net/containers/v1/revisions/$LATEST_REVISION" \
                  -H "Authorization: Bearer $YC_IAM_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"runtime":{"port":8080}}'
                echo ""
                echo "Port set!"

          - name: make-container-public
            env:
              YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                yc config set folder-id $YC_FOLDER_ID
                echo "Making container public via API..."
                CONTAINER_ID=$(yc serverless container get --name $YC_SERVERLESS_CONTAINER_NAME | grep "^id:" | sed 's/^id: //')
                echo "Container ID: $CONTAINER_ID"
                curl -s -X POST \
                  "https://serverless-containers.api.cloud.yandex.net/containers/v1/containers/$CONTAINER_ID:setAccessBindings" \
                  -H "Authorization: Bearer $YC_IAM_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"accessBindings":[{"roleId":"serverless-containers.containerInvoker","subject":{"id":"allUsers","type":"system"}}]}'
                echo ""
                echo "Container is now public!"

          - name: get-container-url
            env:
              YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - |
                yc config set folder-id $YC_FOLDER_ID
                echo "Getting container URL..."
                CONTAINER_URL=$(yc serverless container get --name $YC_SERVERLESS_CONTAINER_NAME | grep "^url:" | sed 's/^url: //')
                echo "Container URL: $CONTAINER_URL"
                echo "container_url=$CONTAINER_URL" >> $SOURCECRAFT_OUTPUT

          - name: register-webhook
            env:
              TG_BOT_TOKEN: ${{ inputs.bot-token }}
              CONTAINER_URL: ${{ cubes.get-container-url.outputs.container_url }}
            script:
              - |
                if [ -n "$TG_BOT_TOKEN" ] && [ "$TG_BOT_TOKEN" != "YOUR_TG_BOT_TOKEN" ]; then
                    echo "TG_BOT_TOKEN is properly set"
                    echo "Setting webhook to container URL..."
                    echo "Container URL: $CONTAINER_URL"
                    curl --request POST --url https://api.telegram.org/bot$TG_BOT_TOKEN/setWebhook?url=${CONTAINER_URL}/
                    echo "Webhook set!"
                else
                    echo "TG_BOT_TOKEN is either not set or equals placeholder value"
                fi

          - name: get-outputs
            script:
              - |
                echo "Container deployed successfully!"
                echo "Container name: $YC_SERVERLESS_CONTAINER_NAME"
                echo "Container URL: ${{ cubes.get-container-url.outputs.container_url }}"